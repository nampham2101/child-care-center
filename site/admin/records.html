<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Records | Sunny Days Admin</title>
  <meta name="robots" content="noindex">
  <link rel="identity.netlify.com" href="https://child-carecenter.netlify.app/.netlify/identity">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="admin.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="admin-body">
  <header class="admin-topbar">
    <a href="index.html" class="logo">Sunny Days Admin</a>
    <nav class="admin-nav" aria-label="Admin navigation">
      <a href="index.html">Dashboard</a>
      <a href="records.html" aria-current="page">Records</a>
    </nav>
    <button class="btn btn-secondary" type="button" data-logout>Log Out</button>
  </header>

  <main class="container admin-main">
    <h1>Records</h1>

    <section class="card" aria-labelledby="filter-heading">
      <h2 id="filter-heading">Filter</h2>
      <form id="filter-form" class="filter-bar">
        <div class="form-field">
          <label for="f-category">Category</label>
          <input type="text" id="f-category" name="category" list="category-options" placeholder="All categories">
          <datalist id="category-options">
            <option value="tuition"></option>
            <option value="supplies"></option>
            <option value="payroll"></option>
            <option value="utilities"></option>
            <option value="food"></option>
            <option value="maintenance"></option>
          </datalist>
        </div>
        <div class="form-field">
          <label for="f-from">From</label>
          <input type="date" id="f-from" name="from">
        </div>
        <div class="form-field">
          <label for="f-to">To</label>
          <input type="date" id="f-to" name="to">
        </div>
        <div class="filter-actions">
          <button type="submit" class="btn btn-primary">Apply</button>
          <button type="button" class="btn btn-secondary" id="this-month">This Month</button>
          <button type="button" class="btn btn-secondary" id="clear-filters">Clear</button>
        </div>
      </form>
    </section>

    <p id="records-summary" class="records-summary" role="status" aria-live="polite"></p>

    <div class="card table-card">
      <table class="records-table">
        <thead>
          <tr>
            <th scope="col">Date</th>
            <th scope="col">Type</th>
            <th scope="col">Category</th>
            <th scope="col" class="num">Amount</th>
            <th scope="col">Note</th>
          </tr>
        </thead>
        <tbody id="records-body"></tbody>
      </table>
      <p id="records-empty" class="empty-state" hidden>No entries found.</p>
    </div>
  </main>

  <script src="admin-auth.js"></script>
  <script src="admin-api.js"></script>
  <script src="records.js"></script>
</body>
</html>
