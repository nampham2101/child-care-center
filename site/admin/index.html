<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Sunny Days Admin</title>
  <meta name="robots" content="noindex">
  <link rel="identity.netlify.com" href="https://child-carecenter.netlify.app/.netlify/identity">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="admin.css">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body class="admin-body">
  <header class="admin-topbar">
    <a href="index.html" class="logo">Sunny Days Admin</a>
    <nav class="admin-nav" aria-label="Admin navigation">
      <a href="index.html" aria-current="page">Dashboard</a>
      <a href="records.html">Records</a>
    </nav>
    <button class="btn btn-secondary" type="button" data-logout>Log Out</button>
  </header>

  <main class="container admin-main">
    <h1>Dashboard</h1>

    <section class="totals-grid" aria-label="Running totals">
      <div class="card total-card total-income">
        <span class="total-label">Total Income</span>
        <span class="total-value" id="total-income">—</span>
      </div>
      <div class="card total-card total-expense">
        <span class="total-label">Total Expenses</span>
        <span class="total-value" id="total-expense">—</span>
      </div>
      <div class="card total-card total-profit">
        <span class="total-label">Profit</span>
        <span class="total-value" id="total-profit">—</span>
      </div>
    </section>

    <section class="card" aria-labelledby="add-heading">
      <h2 id="add-heading">Add Entry</h2>
      <form id="entry-form" class="form-grid" autocomplete="off">
        <div class="form-field">
          <label for="type">Type</label>
          <select id="type" name="type" required>
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
        </div>
        <div class="form-field">
          <label for="amount">Amount ($)</label>
          <input type="number" id="amount" name="amount" min="0" step="0.01" inputmode="decimal" required>
        </div>
        <div class="form-field">
          <label for="category">Category</label>
          <input type="text" id="category" name="category" list="category-options" required>
          <datalist id="category-options">
            <option value="tuition"></option>
            <option value="supplies"></option>
            <option value="payroll"></option>
            <option value="utilities"></option>
            <option value="food"></option>
            <option value="maintenance"></option>
          </datalist>
        </div>
        <div class="form-field">
          <label for="date">Date</label>
          <input type="date" id="date" name="date" required>
        </div>
        <div class="form-field">
          <label for="note">Note (optional)</label>
          <input type="text" id="note" name="note" maxlength="500">
        </div>
        <button type="submit" class="btn btn-primary">Add Entry</button>
        <p id="form-status" class="form-note" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="admin-auth.js"></script>
  <script src="admin-api.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
